<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>AgroGlif</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Roboto;
}

/* FUNDO */

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1950&q=80") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

/* CONTEÚDO */

.content{
position:relative;
z-index:2;
text-align:center;
color:white;
}

/* LOGO */

.logo{
font-size:60px;
font-weight:700;
margin-bottom:10px;
}

.logo span{
color:#ffc107;
}

/* FRASE */

.slogan{
font-size:22px;
margin-bottom:40px;
}

/* CARDS */

.cards{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

/* CARD */

.card{
background:white;
width:320px;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:left;
color:#333;
}

.card h3{
margin-top:0;
color:#2e7d32;
}

/* INPUT */

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

/* BOTÃO */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2e7d32;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

/* BOTÃO CRIAR */

.btn-criar{
background:#ffc107;
color:black;
}

.btn-criar:hover{
background:#e0a800;
}

</style>
</head>

<body>

<section class="hero">

<div class="content">

<div class="logo">
🌱 Agro<span>Glif</span>
</div>

<div class="slogan">
Gestão inteligente da sua lavoura com tecnologia
</div>

<div class="cards">

<!-- LOGIN -->

<div class="card">

<h3>👤 Login de Usuário</h3>

<input type="email" placeholder="Email">

<input type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<!-- CRIAR CONTA -->

<div class="card">

<h3>📝 Criar Conta</h3>

<p>Ainda não possui conta no AgroGlif?</p>

<button class="btn-criar" onclick="criarConta()">
Criar Conta
</button>

</div>

</div>

</div>

</section>

<script>

function login(){
alert("Login simulado");
}

function criarConta(){
alert("Criar conta simulado");
}

</script>

</body>
</html>
