<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>AgroGlif IA</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* IMAGEM DE FUNDO */

.hero{
background:url("index.html banner-agroglif.png") center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN */

.container{
display:flex;
gap:40px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.card{
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.link{
color:#2e7d32;
cursor:pointer;
font-size:14px;
}

/* DASHBOARD */

#dashboard{
display:none;
padding:30px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.menu div{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
font-weight:bold;
text-align:center;
}

.area{
display:none;
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
}

/* CHAT */

#chatBox{
height:250px;
overflow:auto;
border:1px solid #ccc;
padding:10px;
margin-bottom:10px;
}

/* MAPA */

#map{
height:400px;
width:100%;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="hero" id="loginPage">

<div class="container">

<!-- LOGIN USUARIO -->

<div class="card">

<h2>Login</h2>

<input id="userEmail" placeholder="Email">
<input type="password" id="userSenha" placeholder="Senha">

<button onclick="loginUsuario()">Entrar</button>

<p class="link" onclick="mostrarCadastro()">Criar conta</p>

<div id="register" style="display:none">

<input placeholder="Novo email">
<input placeholder="Nova senha">

<button onclick="alert('Conta criada com sucesso (simulação)')">
Registrar
</button>

</div>

</div>

<!-- LOGIN ADMIN -->

<div class="card">

<h2>ADM</h2>

<input id="adminEmail" placeholder="Email">
<input type="password" id="adminSenha" placeholder="Senha">

<button onclick="loginAdmin()">Entrar</button>

</div>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<h1>🌱 AgroGlif IA</h1>

<div class="menu">

<div onclick="abrir('chat')">Chat IA</div>

<div onclick="abrir('foto')">Diagnóstico Planta</div>

<div onclick="abrir('mapa')">Mapeamento de Solo</div>

<div onclick="abrir('clima')">Clima Agrícola</div>

<div onclick="abrir('fertilizante')">Dose Certa</div>

</div>

<!-- CHAT -->

<div id="chat" class="area">

<h3>Chat IA Agrícola</h3>

<div id="chatBox"></div>

<input id="msg" placeholder="Digite sua pergunta">

<button onclick="enviar()">Enviar</button>

</div>

<!-- FOTO -->

<div id="foto" class="area">

<h3>Diagnóstico por Foto</h3>

<input type="file" id="img">

<button onclick="analisarFoto()">Analisar</button>

<p id="resultadoFoto"></p>

</div>

<!-- MAPA -->

<div id="mapa" class="area">

<h3>Mapa da Área</h3>

<div id="map"></div>

</div>

<!-- CLIMA -->

<div id="clima" class="area">

<h3>Clima Agrícola</h3>

<p id="climaInfo"></p>

</div>

<!-- FERTILIZANTE -->

<div id="fertilizante" class="area">

<h3>Cálculo de Fertilizante</h3>

<input id="area" placeholder="Área em hectares">

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

</div>

<script>

/* LOGIN USUARIO */

function loginUsuario(){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";
}

/* LOGIN ADMIN */

function loginAdmin(){

let email=document.getElementById("adminEmail").value;
let senha=document.getElementById("adminSenha").value;

if(email==="suporte.agroglif@gmail.com" && senha==="Dudu1010"){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

}else{

alert("Login ADM incorreto");

}

}

/* CRIAR CONTA */

function mostrarCadastro(){
document.getElementById("register").style.display="block";
}

/* MENU */

function abrir(id){

document.querySelectorAll(".area").forEach(area=>{
area.style.display="none";
});

document.getElementById(id).style.display="block";

if(id==="mapa"){
initMap();
}

}

/* CHAT IA */

function enviar(){

let msg=document.getElementById("msg").value;

let box=document.getElementById("chatBox");

box.innerHTML+="<p><b>Você:</b> "+msg+"</p>";

let resposta="";

if(msg.toLowerCase().includes("soja"))
resposta="Pode ser ferrugem asiática. Recomenda-se aplicação de fungicida."

else if(msg.toLowerCase().includes("milho"))
resposta="Pode ser ataque de lagarta do cartucho."

else
resposta="Analise clima, fertilidade do solo e presença de pragas.";

box.innerHTML+="<p><b>IA:</b> "+resposta+"</p>";

}

/* ANALISE FOTO */

function analisarFoto(){

document.getElementById("resultadoFoto").innerText =
"Diagnóstico inicial: possível doença foliar. Recomenda-se avaliação agronômica.";

}

/* MAPA */

function initMap(){

let map = new google.maps.Map(document.getElementById("map"), {

center:{lat:-25.37,lng:-52.54},
zoom:12

});

}

/* CLIMA SIMULADO */

document.getElementById("climaInfo").innerText =
"Temperatura: 24°C | Umidade: 70% | Parcialmente nublado";

/* FERTILIZANTE */

function calcular(){

let area=document.getElementById("area").value;

let dose=area*120;

document.getElementById("resultado").innerText =
"Recomendação aproximada: "+dose+" kg de fertilizante.";

}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?callback=initMap">
</script>

</body>
</html>
